<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Sininho — Login responsivo (preview)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --red:#EC1C24; --red-deep:#B6211D; --green:#21A14B; --green-deep:#178a3f;
  --paper:#ffffff; --paper-2:#fbf8f8; --text:#211314; --muted:#8b7a7a;
  --line:rgba(20,8,8,.10); --shadow:0 22px 60px rgba(20,8,8,.12);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
html{scrollbar-width:none;-ms-overflow-style:none}
html::-webkit-scrollbar,body::-webkit-scrollbar{display:none}
body{font-family:'Inter',system-ui,sans-serif;color:var(--text);background:#fff;overflow:hidden}

/* ===== SPLIT (desktop por padrão) ===== */
#login{position:fixed;inset:0;display:grid;grid-template-columns:1.05fr 1fr;overflow:hidden;background:#fff}

/* lado da marca */
.auth-brand{position:relative;overflow:hidden;display:flex;flex-direction:column;justify-content:center;
  gap:18px;padding:clamp(36px,5vw,72px);color:#fff;
  background:linear-gradient(150deg,var(--red),var(--red-deep) 68%,#8e1a17)}
.auth-brand::after{content:"";position:absolute;width:560px;height:560px;border-radius:50%;
  right:-180px;bottom:-220px;background:radial-gradient(closest-side,rgba(255,255,255,.13),transparent)}
.deco{position:absolute;inset:0;pointer-events:none}
.ring{position:absolute;border:2px solid rgba(255,255,255,.32);border-radius:50%}
.xplus{position:absolute;width:26px;height:26px}
.xplus::before,.xplus::after{content:"";position:absolute;background:rgba(255,255,255,.5);border-radius:2px}
.xplus::before{width:2px;height:26px;left:12px;top:0}.xplus::after{height:2px;width:26px;top:12px;left:0}
.dots{position:absolute;width:84px;height:84px;opacity:.6;
  background-image:radial-gradient(rgba(255,255,255,.55) 1.6px,transparent 1.6px);background-size:14px 14px}

.bell{position:relative;z-index:1;width:88px;height:88px;border-radius:50%;display:grid;place-items:center;
  background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.5);
  box-shadow:inset 0 1px 6px rgba(255,255,255,.25)}
.bell svg{width:44px;height:44px;stroke:#fff;stroke-width:1.9;fill:none;stroke-linecap:round;stroke-linejoin:round;
  transform-origin:50% 16%;animation:bellring 5s ease-in-out 1.2s infinite}
@keyframes bellring{0%,84%,100%{transform:rotate(0)}86%{transform:rotate(10deg)}88%{transform:rotate(-8deg)}
  90%{transform:rotate(6deg)}92%{transform:rotate(-4deg)}94%{transform:rotate(2deg)}96%{transform:rotate(-1deg)}}
@media (prefers-reduced-motion:reduce){.bell svg{animation:none}}
.auth-brand h2{position:relative;z-index:1;font-family:'Anton',sans-serif;font-weight:400;line-height:.98;
  text-transform:uppercase;letter-spacing:.01em;font-size:clamp(38px,4.6vw,60px)}
.auth-brand p{position:relative;z-index:1;max-width:42ch;font-weight:600;font-size:clamp(14px,1.1vw,16px);
  line-height:1.5;color:rgba(255,255,255,.92)}

/* lado do formulário */
.auth-form{display:flex;align-items:center;justify-content:center;overflow:auto;
  padding:clamp(28px,4vw,56px);background:linear-gradient(180deg,#fff,var(--paper-2))}
.inner{width:100%;max-width:384px}
.brand-mini{display:inline-flex;align-items:center;gap:10px;margin-bottom:22px}
.wordmark{font-weight:900;font-size:19px;letter-spacing:-.01em;color:var(--text)}
.wordmark b{color:var(--red)}
.rolebadge{font-weight:900;letter-spacing:.12em;text-transform:uppercase;font-size:11px;
  padding:5px 12px;border-radius:999px;background:rgba(236,28,36,.10);color:var(--red-deep)}
.inner h1{font-family:'Anton',sans-serif;font-weight:400;text-transform:uppercase;letter-spacing:.01em;
  font-size:clamp(28px,3.4vw,38px);line-height:1.02;margin-bottom:6px}
.lead{color:var(--muted);font-weight:600;font-size:14.5px;line-height:1.45;margin-bottom:18px}
label.f{display:block;font-weight:800;font-size:12px;letter-spacing:.04em;text-transform:uppercase;
  color:var(--text);margin:14px 0 6px}
input{width:100%;font:inherit;font-weight:600;color:var(--text);background:var(--paper-2);
  border:1px solid var(--line);border-radius:13px;padding:13px 15px;outline:none;
  transition:border-color .15s,box-shadow .15s}
input:focus{border-color:var(--green);box-shadow:0 0 0 4px rgba(33,161,75,.16)}
.btn{width:100%;margin-top:22px;border:none;border-radius:15px;cursor:pointer;
  background:linear-gradient(160deg,var(--red),var(--red-deep));color:#fff;font-weight:900;
  letter-spacing:.04em;text-transform:uppercase;font-size:16px;padding:16px;
  box-shadow:0 14px 30px rgba(236,28,36,.3);transition:transform .12s,filter .15s}
.btn:hover{filter:brightness(1.05)}.btn:active{transform:translateY(1px)}
.helper{margin-top:16px;text-align:center;color:var(--muted);font-weight:600;font-size:12.5px}
.helper a{color:var(--green-deep);text-decoration:none;font-weight:800}

.pw{position:relative}.pw input{padding-right:50px}
.pw-toggle{position:absolute;right:7px;top:50%;transform:translateY(-50%);width:36px;height:36px;border:none;
  background:transparent;cursor:pointer;display:grid;place-items:center;color:var(--muted);border-radius:10px;
  transition:color .15s,background .15s}
.pw-toggle:hover{color:var(--text);background:var(--paper-2)}
.pw-toggle svg{width:21px;height:21px;stroke:currentColor;stroke-width:1.9;fill:none;stroke-linecap:round;stroke-linejoin:round}
.pw-toggle .eye-off{display:none}.pw-toggle.on .eye-on{display:none}.pw-toggle.on .eye-off{display:block}

/* ===== MOBILE: empilha, formulário sobe num cartão arredondado (imagem 2) ===== */
@media (max-width:760px){
  #login{grid-template-columns:1fr;grid-template-rows:clamp(200px,34dvh,300px) 1fr}
  .auth-brand{justify-content:flex-end;gap:10px;padding:26px 24px 40px}
  .auth-brand h2{font-size:clamp(30px,9vw,42px)}
  .auth-brand p{display:none}
  .bell{width:62px;height:62px}.bell svg{width:30px;height:30px}
  .auth-form{align-items:flex-start;border-radius:28px 28px 0 0;margin-top:-26px;z-index:2;
    padding:30px 24px 28px;box-shadow:0 -10px 30px rgba(20,8,8,.08)}
  .inner{max-width:none}
  .brand-mini{margin-bottom:16px}
}
</style>
</head>
<body>

<section class="screen active" id="login">
  <aside class="auth-brand">
    <div class="deco">
      <span class="xplus" style="top:11%;left:24%"></span>
      <span class="xplus" style="bottom:18%;left:30%;transform:scale(.8)"></span>
      <span class="xplus" style="top:46%;right:16%;transform:scale(1.1)"></span>
      <span class="ring" style="width:18px;height:18px;top:30%;left:46%"></span>
      <span class="ring" style="width:54px;height:54px;bottom:14%;left:8%"></span>
      <span class="dots" style="top:10%;right:9%"></span>
    </div>
    <div class="bell" aria-hidden="true">
      <svg viewBox="0 0 24 24"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.7 21a2 2 0 0 1-3.4 0"/></svg>
    </div>
    <h2>Bem-vindo<br>de volta!</h2>
    <p>Registre e celebre cada nova família que realiza o sonho da casa própria com a Metrocasa.</p>
  </aside>

  <main class="auth-form">
    <div class="inner">
      <span class="brand-mini">
        <span class="wordmark">metro<b>casa</b></span>
        <span class="rolebadge">Sininho</span>
      </span>
      <h1>Entrar</h1>
      <p class="lead">Acesso da equipe Metrocasa.</p>

      <label class="f" for="ge">E-mail</label>
      <input type="email" id="ge" autocomplete="username" placeholder="email@metrocasa.com.br">

      <label class="f" for="gp">Senha</label>
      <div class="pw">
        <input type="password" id="gp" autocomplete="current-password" placeholder="••••••••">
        <button type="button" class="pw-toggle" id="pwToggle" aria-label="Mostrar senha">
          <svg class="eye-on" viewBox="0 0 24 24"><path d="M2 12s3.6-7 10-7 10 7 10 7-3.6 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/></svg>
          <svg class="eye-off" viewBox="0 0 24 24"><path d="M9.9 4.2A11 11 0 0 1 12 4c6.4 0 10 7 10 7a18 18 0 0 1-3 3.6M6.6 6.6A18 18 0 0 0 2 11s3.6 7 10 7a11 11 0 0 0 4.4-.9"/><path d="M3 3l18 18"/></svg>
        </button>
      </div>

      <button class="btn" onclick="alert('preview — sem backend')">Entrar</button>
      <p class="helper">Esqueceu a senha? <a href="#">Fale com o suporte</a></p>
    </div>
  </main>
</section>

<script>
(function(){
  const t=document.getElementById('pwToggle'), p=document.getElementById('gp');
  if(t&&p) t.addEventListener('click',()=>{
    const show=p.type==='password'; p.type=show?'text':'password';
    t.classList.toggle('on',show);
    t.setAttribute('aria-label',show?'Ocultar senha':'Mostrar senha');
  });
})();
</script>
</body>
</html>
