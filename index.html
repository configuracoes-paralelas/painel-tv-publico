<style>
:root{
  --paper:#ffffff;
  --paper-2:#fbf8f8;
  --text:#211314;
  --muted:#8b7a7a;
  --line:rgba(20,8,8,.10);
  --red:#EC1C24;
  --red-deep:#B6211D;
  --red-strong:#941F18;
  --green:#21A14B;
  --green-deep:#178a3f;
  --shadow:0 22px 60px rgba(20,8,8,.12);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:'Inter',system-ui,sans-serif;
  background:var(--paper);
  color:var(--text);
  overflow:hidden;
  -webkit-font-smoothing:antialiased;
}
button{font-family:inherit;cursor:pointer;border:none;color:inherit;background:none}
.hidden{display:none !important}

/* ============== MENU ============== */
#menu{
  position:fixed;inset:0;z-index:10;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:clamp(16px,3.2vh,52px);
  padding:clamp(16px,4vh,48px) 5vw;
  background:
    radial-gradient(70% 50% at 50% 4%, rgba(33,161,75,.07), transparent 60%),
    linear-gradient(180deg, #ffffff, var(--paper-2) 70%);
  text-align:center;
}
#menu .brand{
  display:flex;flex-direction:column;align-items:center;gap:clamp(8px,1.4vh,20px);
  opacity:0;transform:translateY(18px);
  animation:rise .9s .05s cubic-bezier(.16,1,.3,1) forwards;
}
#menu .brand img{
  width:auto;height:auto;max-width:min(44vw,440px);max-height:24vh;
  filter:drop-shadow(0 16px 34px rgba(20,8,8,.14));
}
#menu .eyebrow{
  font-weight:800;letter-spacing:.42em;text-transform:uppercase;
  font-size:clamp(13px,1.5vw,20px);color:var(--green-deep);
  padding-left:.42em;
}

.choices{
  display:grid;grid-template-columns:repeat(2,minmax(0,1fr));
  gap:clamp(24px,3.2vw,56px);
  width:min(1180px,92vw);
}
.choice{
  position:relative;overflow:hidden;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:clamp(18px,2vw,30px);
  aspect-ratio:1/.82;max-height:50vh;
  border-radius:32px;
  background:var(--paper);
  border:1px solid var(--line);
  box-shadow:var(--shadow);
  color:var(--text);
  transition:transform .22s cubic-bezier(.16,1,.3,1), box-shadow .22s, border-color .22s, color .22s;
  opacity:0;transform:translateY(26px);
  outline:none;
}
.choice:nth-child(1){animation:rise .8s .25s cubic-bezier(.16,1,.3,1) forwards}
.choice:nth-child(2){animation:rise .8s .38s cubic-bezier(.16,1,.3,1) forwards}
/* tiny green corner mark — echo do "+" do logo */
.choice .plus{
  position:absolute;top:clamp(16px,1.8vw,26px);right:clamp(16px,1.8vw,26px);
  width:clamp(22px,2.2vw,34px);height:clamp(22px,2.2vw,34px);z-index:1;
  color:var(--green);transition:color .22s, transform .22s;
}
.choice .plus svg{width:100%;height:100%;stroke:currentColor;stroke-width:9;
  stroke-linecap:round;fill:none}
/* red wash que acende no hover/foco */
.choice::before{
  content:"";position:absolute;inset:0;border-radius:inherit;
  background:linear-gradient(160deg, var(--red), var(--red-strong));
  opacity:0;transition:opacity .22s;z-index:0;
}
.choice > *{position:relative;z-index:1}
.choice .ico{
  width:clamp(96px,9vw,150px);height:clamp(96px,9vw,150px);
  display:grid;place-items:center;border-radius:26px;
  background:rgba(236,28,36,.10);
  border:1px solid rgba(236,28,36,.30);
  transition:background .22s, border-color .22s, transform .22s;
}
.choice .ico svg{width:62%;height:62%;stroke:var(--red);stroke-width:7;fill:none;
  stroke-linecap:round;stroke-linejoin:round;transition:stroke .22s}
.choice .lbl{
  font-family:'Anton',sans-serif;font-weight:400;
  font-size:clamp(40px,6vw,86px);line-height:.95;letter-spacing:.02em;text-transform:uppercase;
}
.choice .sub{font-weight:700;font-size:clamp(13px,1.4vw,18px);color:var(--green-deep);
  letter-spacing:.14em;text-transform:uppercase;
  display:inline-flex;align-items:center;gap:.55em;transition:color .22s}
.choice .sub::before{content:"";width:.5em;height:.5em;border-radius:50%;
  background:var(--green);transition:background .22s}
/* hover + foco de teclado/controle */
.choice:hover, .choice:focus-visible{
  transform:translateY(-6px) scale(1.012);
  border-color:rgba(20,8,8,.12);
  box-shadow:0 40px 90px rgba(236,28,36,.30);
  color:#fff;
}
.choice:hover::before, .choice:focus-visible::before{opacity:1}
.choice:hover .ico, .choice:focus-visible .ico{
  background:rgba(255,255,255,.18);border-color:rgba(255,255,255,.4);transform:scale(1.04);
}
.choice:hover .ico svg, .choice:focus-visible .ico svg{stroke:#fff}
.choice:hover .sub, .choice:focus-visible .sub{color:rgba(255,255,255,.92)}
.choice:hover .sub::before, .choice:focus-visible .sub::before{background:#fff}
.choice:hover .plus, .choice:focus-visible .plus{color:#fff;transform:rotate(90deg)}
/* anel de foco verde para o controle remoto */
.choice:focus-visible{box-shadow:0 0 0 5px rgba(33,161,75,.55), 0 30px 70px rgba(20,8,8,.18)}
.choice:active{transform:translateY(-2px) scale(.995)}
/* foco por teclado/controle de TV — mesmo visual do hover + anel verde */
.choice:focus{outline:none;transform:translateY(-6px) scale(1.012);color:#fff;border-color:rgba(20,8,8,.12);box-shadow:0 0 0 5px rgba(33,161,75,.55), 0 30px 70px rgba(20,8,8,.18)}
.choice:focus::before{opacity:1}
.choice:focus .ico{background:rgba(255,255,255,.18);border-color:rgba(255,255,255,.4);transform:scale(1.04)}
.choice:focus .ico svg{stroke:#fff}
.choice:focus .sub{color:rgba(255,255,255,.92)}
.choice:focus .sub::before{background:#fff}
.choice:focus .plus{color:#fff;transform:rotate(90deg)}

#menuHint{
  font-size:clamp(12px,1.3vw,16px);color:var(--muted);font-weight:600;
  letter-spacing:.06em;opacity:0;animation:rise .8s .6s ease forwards;
  display:inline-flex;align-items:center;gap:.6em;
}
#menuHint::before{content:"";width:.5em;height:.5em;border-radius:50%;background:var(--green)}

@keyframes rise{to{opacity:1;transform:none}}

/* ============== PLAYER ============== */
#player{position:fixed;inset:0;z-index:20;background:#000}
.track{position:absolute;inset:0;overflow:hidden}
.slot{
  position:absolute;inset:0;width:100%;height:100%;
  display:flex;align-items:center;justify-content:center;
  will-change:transform;
}
.slot video{width:100%;height:100%;object-fit:cover;background:#000;display:block}
.slot iframe{position:absolute;inset:0;width:100%;height:100%;border:0;display:none;background:#000}
.slot.show-yt video{display:none}
.slot.show-yt iframe{display:block}
.slot.slide{transition:transform .62s cubic-bezier(.7,0,.2,1)}
.slot.off-right{transform:translateX(100%)}
.slot.off-left{transform:translateX(-100%)}
.slot.center{transform:translateX(0)}

/* controles — somem na TV, voltam com atividade */
.player-ui{position:absolute;inset:0;z-index:30;pointer-events:none;
  opacity:1;transition:opacity .4s}
.player-ui.idle{opacity:0}
.player-ui > *{pointer-events:auto}
.topbar{
  position:absolute;top:0;left:0;right:0;
  display:flex;align-items:center;justify-content:space-between;
  gap:14px;padding:clamp(16px,2.4vh,30px) clamp(20px,3vw,44px);
  background:linear-gradient(180deg, rgba(0,0,0,.55), transparent);
}
.tag{display:flex;align-items:center;gap:12px;color:#fff;font-weight:800;letter-spacing:.14em;
  text-transform:uppercase;font-size:clamp(13px,1.5vw,20px)}
.tag .dot{width:11px;height:11px;border-radius:50%;background:var(--green);
  box-shadow:0 0 0 0 var(--green);animation:beat 2s infinite}
@keyframes beat{0%{box-shadow:0 0 0 0 rgba(33,161,75,.55)}70%{box-shadow:0 0 0 14px rgba(33,161,75,0)}100%{box-shadow:0 0 0 0 rgba(33,161,75,0)}}
.ctrls{display:flex;gap:10px}
.btn{
  width:clamp(48px,5vh,62px);height:clamp(48px,5vh,62px);border-radius:16px;
  background:rgba(0,0,0,.45);border:1px solid rgba(255,255,255,.18);
  display:grid;place-items:center;color:#fff;backdrop-filter:blur(6px);
  transition:background .15s,border-color .15s,transform .15s;
}
.btn:hover,.btn:focus-visible{background:rgba(236,28,36,.85);border-color:#fff;outline:none;transform:scale(1.05)}
.btn svg{width:46%;height:46%;stroke:#fff;stroke-width:2.4;fill:none;stroke-linecap:round;stroke-linejoin:round}

/* botão "Ativar som" (aparece só quando o navegador muta o YouTube) */
.sound-cta{
  position:absolute;left:50%;bottom:clamp(24px,5vh,56px);transform:translateX(-50%);
  z-index:35;display:flex;align-items:center;gap:12px;
  padding:14px 26px;border-radius:999px;
  background:var(--green);color:#fff;font-weight:800;letter-spacing:.04em;
  font-size:clamp(15px,1.8vw,21px);
  box-shadow:0 14px 38px rgba(33,161,75,.45);
  animation:ctaPulse 1.8s ease-in-out infinite;
}
.sound-cta svg{width:clamp(20px,2.2vw,28px);height:clamp(20px,2.2vw,28px);stroke:#fff;stroke-width:2.2;fill:none;stroke-linecap:round;stroke-linejoin:round}
.sound-cta:focus{outline:none;box-shadow:0 0 0 4px rgba(255,255,255,.85), 0 14px 38px rgba(33,161,75,.5)}
@keyframes ctaPulse{0%,100%{transform:translateX(-50%) scale(1)}50%{transform:translateX(-50%) scale(1.05)}}

/* pop-up "nova família" — TAKEOVER de tela cheia (pra ver do salão) */
.promo{
  position:fixed;inset:0;
  opacity:0;transform:scale(1.05);
  z-index:60;pointer-events:none;
  display:flex;align-items:center;justify-content:flex-start;
  gap:clamp(24px,3.4vw,80px);
  padding:clamp(16px,2.4vw,44px) clamp(28px,4vw,80px);
  background:radial-gradient(120% 90% at 18% 50%, #f5333b 0%, var(--red) 45%, var(--red-deep) 100%);
  transition:opacity .35s ease, transform .55s cubic-bezier(.2,1.5,.35,1);
  will-change:transform,opacity;
}
.promo.show{opacity:1;transform:scale(1)}
/* "+" da Metrocasa no canto SUPERIOR DIREITO da tela */
.promo-mark{position:absolute;top:clamp(28px,4vw,72px);right:clamp(36px,5vw,96px);
  width:clamp(84px,9vw,168px);height:clamp(84px,9vw,168px);object-fit:contain;
  filter:drop-shadow(0 8px 22px rgba(0,0,0,.28))}
.promo.show .promo-mark{animation:plusPop .7s cubic-bezier(.2,1.7,.35,1) .12s both}
/* coluna da esquerda = foto GRANDE, retangular, quase toda a altura */
.promo-media{flex:0 0 33%;display:flex;align-items:center;justify-content:center;height:100%}
.face-wrap{position:relative;width:100%;height:100%;max-width:660px}
.promo-face{width:100%;height:100%;object-fit:cover;border-radius:clamp(14px,1.5vw,26px);
  border:clamp(5px,.6vw,12px) solid #fff;background:#0b1020;box-shadow:0 18px 60px rgba(0,0,0,.45)}
/* sem foto (fallback): esconde a moldura vazia, texto ocupa tudo, "+" segue no topo */
.promo.no-face .promo-media{display:none}
.promo.show .face-wrap{animation:facePop .6s cubic-bezier(.2,1.55,.35,1) both}
@keyframes plusPop{0%{transform:scale(0) rotate(-12deg)}100%{transform:scale(1) rotate(0)}}
@keyframes facePop{0%{transform:scale(.85);opacity:0}100%{transform:scale(1);opacity:1}}
/* coluna da direita = resto, texto GIGANTE (cabe sem cortar) */
.promo-words{flex:1 1 auto;min-width:0;display:flex;flex-direction:column;align-items:flex-start;
  justify-content:center;color:#fff;line-height:.9}
.promo-words b{font-family:'Inter',sans-serif;font-weight:900;letter-spacing:-.025em;
  font-size:clamp(44px,10vw,152px);line-height:.92;white-space:nowrap}
.promo-sub{margin-top:.35em;font-family:'Inter',sans-serif;font-weight:800;
  font-size:clamp(20px,3.2vw,54px);color:#fff;opacity:.97;letter-spacing:.005em}
.promo-loja{margin-top:.18em;font-family:'Inter',sans-serif;font-weight:800;
  font-size:clamp(16px,2.3vw,40px);color:#fff;opacity:.9}
@media (max-width:640px){
  .promo{flex-direction:column;justify-content:center;text-align:center;gap:18px;padding:24px}
  .promo-media{flex:none;height:auto;max-height:54vh}
  .promo-words{align-items:center;text-align:center}
  .promo-mark{width:64px;height:64px;top:18px;right:18px}
}

/* overlays (claros) */
.overlay{
  position:absolute;inset:0;z-index:40;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:18px;text-align:center;padding:8vw;
  background:rgba(255,255,255,.97);
}
.overlay .spin{width:54px;height:54px;border-radius:50%;
  border:4px solid rgba(20,8,8,.12);border-top-color:var(--green);
  animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.overlay h3{font-family:'Anton',sans-serif;font-weight:400;font-size:clamp(26px,4vw,52px);
  text-transform:uppercase;letter-spacing:.02em;color:var(--text)}
.overlay p{max-width:760px;color:var(--muted);font-size:clamp(15px,1.7vw,21px);line-height:1.5}
.overlay code{background:rgba(20,8,8,.06);padding:2px 8px;border-radius:6px;color:var(--text);font-size:.92em}
.overlay .btn-text{margin-top:6px;padding:14px 30px;border-radius:14px;background:var(--red);
  color:#fff;font-weight:800;letter-spacing:.06em;text-transform:uppercase;font-size:clamp(14px,1.6vw,18px)}
.overlay .btn-text:hover,.overlay .btn-text:focus-visible{background:var(--red-deep);outline:none}

/* celular em pé / janela estreita: empilha os dois cards */
@media (max-width:640px), (orientation:portrait){
  .choices{grid-template-columns:1fr;width:min(560px,92vw);gap:clamp(14px,2.4vh,26px)}
  .choice{aspect-ratio:auto;max-height:none;min-height:clamp(148px,23vh,260px);gap:clamp(12px,2vh,22px)}
  .choice .lbl{font-size:clamp(42px,12vw,66px)}
  .choice .ico{width:clamp(72px,15vw,108px);height:clamp(72px,15vw,108px)}
  #menu .brand img{max-height:18vh}
  #menu .eyebrow{font-size:clamp(12px,3vw,16px)}
}
/* paisagem bem baixa (celular deitado / notebook curto): encolhe um pouco mais */
@media (orientation:landscape) and (max-height:520px){
  #menu .brand img{max-height:30vh}
  .choice{max-height:62vh}
  .choice .lbl{font-size:clamp(34px,7vh,60px)}
}

@media (prefers-reduced-motion: reduce){
  *{animation-duration:.001s !important}
  .slot.slide{transition:none}
  #menu .brand,.choice,#menuHint{opacity:1;transform:none}
}
</style>
</head>

/* ---------- CSV mínimo (lida com aspas e vírgulas internas) ---------- */
function parseCSV(text){
  const rows=[]; let row=[], cur="", q=false;
  for(let i=0;i<text.length;i++){
    const c=text[i];
    if(q){
      if(c=='"'){ if(text[i+1]=='"'){cur+='"';i++;} else q=false; }
      else cur+=c;
    } else {
      if(c=='"') q=true;
      else if(c==',') { row.push(cur); cur=""; }
      else if(c=='\n'){ row.push(cur); rows.push(row); row=[]; cur=""; }
      else if(c=='\r'){ /* skip */ }
      else cur+=c;
    }
  }
  if(cur.length||row.length){ row.push(cur); rows.push(row); }
  return rows;
}

function gvizUrl(){
  return `https://docs.google.com/spreadsheets/d/${CFG.id}/gviz/tq`
       + `?tqx=out:csv&headers=0&sheet=${encodeURIComponent(CFG.sheet)}`
       + `&range=${encodeURIComponent(CFG.range)}`;
}
async function fetchLinks(){
  const res = await fetch(gvizUrl(), {credentials:"omit", cache:"no-store"});
  if(!res.ok) throw new Error("HTTP "+res.status);
  const rows = parseCSV(await res.text());
  const loja=[], decorado=[];
  for(const r of rows){
    splitLinks(r[0]).forEach(l=>loja.push(l));     // coluna A
    splitLinks(r[1]).forEach(l=>decorado.push(l));  // coluna B
  }
  return { loja, decorado };
}
function splitLinks(s){
  return String(s||"").split(/[\n,]+/).map(x=>x.trim()).filter(x=>/^https?:\/\//i.test(x));
}

/* ---------- detecção de tipo de link ---------- */
function ytId(url){
  const m = String(url||"").match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?(?:.*&)?v=|embed\/|shorts\/|live\/|v\/))([A-Za-z0-9_-]{11})/);
  return m ? m[1] : null;
}
function mediaCandidates(url){
  const s = String(url||"").trim();
  const m = s.match(/\/d\/([A-Za-z0-9_-]{20,})/) || s.match(/[?&]id=([A-Za-z0-9_-]{20,})/);
  if(!m) return [s];
  const id = m[1];
  return [
    `https://drive.usercontent.google.com/download?id=${id}&export=download&authuser=0`,
    `https://drive.usercontent.google.com/download?id=${id}&export=download&confirm=t`,
    `https://drive.google.com/uc?export=download&id=${id}&confirm=t`,
    `https://drive.google.com/uc?export=download&id=${id}`
  ];
}
function startTime(url){
  const m = String(url||"").match(/[?&]t=([\d.]+)/);
  return m ? parseFloat(m[1]) : 0;
}

/* =========================================================================
   ESTADO
   ========================================================================= */
let LINKS = { loja:[], decorado:[] };
let queue = [];      // [{kind:'yt'|'media', ...}]
let idx = 0;
let cur, nxt;
let wantSound = true;
let busy = false;

const $ = (s)=>document.querySelector(s);
const slotA = { wrap:$("#slotA"), vid:$("#vidA"), mountId:"ytA", yt:null, kind:null, _qi:-1 };
const slotB = { wrap:$("#slotB"), vid:$("#vidB"), mountId:"ytB", yt:null, kind:null, _qi:-1 };

/* =========================================================================
   YOUTUBE IFRAME API
   ========================================================================= */
let YT_READY=false, ytPending=[];
function ensureYT(cb){ if(YT_READY) cb(); else ytPending.push(cb); }
function loadYTApi(){
  if(document.getElementById("yt-api")) return;
  const s=document.createElement("script"); s.id="yt-api"; s.src="https://www.youtube.com/iframe_api";
  document.head.appendChild(s);
}
window.onYouTubeIframeAPIReady = function(){
  [slotA, slotB].forEach(slot=>{
    slot.yt = new YT.Player(slot.mountId, {
      width:"100%", height:"100%", videoId:"",
      playerVars:{autoplay:0,controls:0,rel:0,modestbranding:1,playsinline:1,fs:0,disablekb:1,iv_load_policy:3},
      events:{
        onStateChange:(e)=>{
          if(e.data===YT.PlayerState.PLAYING && slot===cur) showLoading(false);
          if(e.data===YT.PlayerState.ENDED && slot===cur && !busy) slideNext();
        },
        onError:(e)=>{ if(slot===cur) handleYTError(e.data); }
      }
    });
  });
  YT_READY=true; ytPending.forEach(f=>f()); ytPending=[];
};
function handleYTError(code){
  if(queue.length>1){ slideNext(); return; }
  let msg;
  if(code===101 || code===150)
    msg = "Esse vídeo do YouTube está com a incorporação <b>desativada</b> pelo dono. No YouTube Studio, abra o vídeo → Detalhes → e ative “Permitir incorporação”. Ou use outro vídeo.";
  else if(code===100)
    msg = "Vídeo do YouTube não encontrado, privado ou removido. Confirme o link e deixe o vídeo como <b>Público</b> ou <b>Não listado</b>.";
  else if(code===2)
    msg = "O ID do vídeo no link está incorreto. Confira o link na planilha.";
  else
    msg = "Não foi possível carregar o vídeo do YouTube (código "+code+").";
  showError(true, "Vídeo do YouTube indisponível", msg);
}

/* =========================================================================
   MENU
   ========================================================================= */
document.querySelectorAll(".choice").forEach(b=>{
  b.addEventListener("click", ()=> startCategory(b.dataset.cat));
});

async function startCategory(cat){
  goFullscreen();        // gesto do usuário -> pode entrar em tela cheia
  wantSound = true;
  $("#catName").textContent = cat === "loja" ? "Loja" : "Decorado";
  $("#menu").classList.add("hidden");
  $("#player").classList.remove("hidden");
  showLoading(true); showError(false); showSoundCta(false);

  if(!LINKS.loja.length && !LINKS.decorado.length){
    try { LINKS = await fetchLinks(); } catch(e){}
  } else {
    fetchLinks().then(l=>LINKS=l).catch(()=>{});
  }
  buildQueue(cat);

  if(!queue.length){
    showLoading(false);
    showError(true, "Nenhum vídeo encontrado",
      `Verifique a planilha (aba <code>${CFG.sheet}</code>): a coluna `
      + (cat==="loja" ? "<code>A</code> (a partir de A2)" : "<code>B</code> (a partir de B2)")
      + " precisa ter os links dos vídeos — 1 por linha (YouTube, Drive público, ou URL .mp4).");
    return;
  }
  idx = 0; cur = slotA; nxt = slotB;
  resetSlots();
  prepareSlot(cur, 0);
  playCur(cur);
  preloadNext();
  // pop-up agora aparece SÓ quando chega uma aprovação real do sininho (sem timer aleatório)
}

function buildQueue(cat){
  const list = (cat==="loja" ? LINKS.loja : LINKS.decorado);
  queue = list.map(u => {
    const yid = ytId(u);
    if(yid) return { kind:"yt", yid, at:startTime(u) };
    return { kind:"media", cands:mediaCandidates(u), at:startTime(u) };
  });
}

/* =========================================================================
   CARROSSEL (dois slots que deslizam; cada um pode ser <video> ou YouTube)
   ========================================================================= */
function resetSlots(){
  slotA.wrap.classList.remove("slide","off-right","off-left"); slotA.wrap.classList.add("center");
  slotB.wrap.classList.remove("slide","center","off-left");    slotB.wrap.classList.add("off-right");
}

function prepareSlot(slot, qi){
  const item = queue[qi];
  slot._qi = qi; slot.kind = item.kind;
  if(item.kind==="yt"){
    slot.wrap.classList.add("show-yt");
    ensureYT(()=>{ try{ slot.yt.cueVideoById({videoId:item.yid, startSeconds:item.at||0}); }catch(e){} });
  } else {
    slot.wrap.classList.remove("show-yt");
    const v=slot.vid;
    v.dataset.ci="0"; v.dataset.at=String(item.at||0); v._cands=item.cands;
    v.muted=!wantSound; v.src=item.cands[0]; v.load();
  }
}

function playCur(slot){
  const item = queue[slot._qi];
  if(slot.kind==="yt"){
    ensureYT(()=>{
      try{
        if(wantSound) slot.yt.unMute(); else slot.yt.mute();
        slot.yt.loadVideoById({videoId:item.yid, startSeconds:item.at||0}); // autoplay
      }catch(e){}
      // se o navegador BLOQUEAR o autoplay com som, cai pra mudo (a TV nunca trava).
      // espera mais (o YouTube demora a engatar) e só muta se REALMENTE não começou —
      // assim não mata o som de um vídeo que só estava carregando.
      setTimeout(()=>{ try{
        const st = slot.yt.getPlayerState ? slot.yt.getPlayerState() : -1;
        // 1 = PLAYING, 3 = BUFFERING -> está indo com som, mantém
        if(slot===cur && st!==1 && st!==3){
          slot.yt.mute(); wantSound=false; updateSoundIcon(); slot.yt.playVideo();
          showSoundCta(true);   // navegador mutou -> oferece 1 toque p/ ligar o som
        }
      }catch(e){} }, 3200);
      // watchdog: sem YouTube (offline / id errado)
      setTimeout(()=>{ try{
        const st = slot.yt.getPlayerState ? slot.yt.getPlayerState() : -1;
        if(slot===cur && (st===-1 || st===5) && $("#error").classList.contains("hidden")){
          showError(true, "Sem conexão com o YouTube",
            "Não consegui carregar o player do YouTube. Confirme a internet na TV e se o vídeo está público.");
        }
      }catch(e){} }, 7000);
    });
  } else {
    const v=slot.vid; v.muted=!wantSound;
    const p=v.play();
    if(p&&p.catch) p.catch(()=>{ v.muted=true; wantSound=false; updateSoundIcon(); v.play().catch(()=>{}); });
  }
}

function stopSlot(slot){
  if(slot.kind==="yt"){ try{ slot.yt && slot.yt.pauseVideo(); }catch(e){} }
  else { try{ slot.vid.pause(); slot.vid.currentTime=0; }catch(e){} }
}

function preloadNext(){
  if(!queue.length) return;
  const ni=(idx+1)%queue.length;
  prepareSlot(nxt, ni);
}

/* fim do <video> -> avança (só se for o slot atual) */
slotA.vid.onended = ()=>{ if(slotA===cur && !busy) slideNext(); };
slotB.vid.onended = ()=>{ if(slotB===cur && !busy) slideNext(); };

/* fallback de URLs do Drive/.mp4 */
function bindFallback(v, slot){
  v.onerror = ()=>{
    if(slot.kind!=="media") return;
    let ci=(parseInt(v.dataset.ci,10)||0)+1;
    if(v._cands && ci<v._cands.length){
      v.dataset.ci=String(ci); v.src=v._cands[ci]; v.load();
      if(slot===cur) v.play().catch(()=>{});
    } else if(slot===cur){
      if(queue.length>1){ slideNext(); }
      else {
        showError(true, "Não foi possível carregar o vídeo",
          "O link da planilha não tocou. Se for Drive, deixe o arquivo público; o ideal é usar YouTube ou uma URL <code>.mp4</code> direta.");
      }
    }
  };
}
bindFallback(slotA.vid, slotA);
bindFallback(slotB.vid, slotB);

function applyStart(v){
  const at=parseFloat(v.dataset.at||"0");
  if(at>0){ try{ v.currentTime=at; }catch(e){} }
}
slotA.vid.addEventListener("loadedmetadata", ()=>applyStart(slotA.vid));
slotB.vid.addEventListener("loadedmetadata", ()=>applyStart(slotB.vid));
slotA.vid.addEventListener("playing", ()=>{ if(slotA===cur) showLoading(false); });
slotB.vid.addEventListener("playing", ()=>{ if(slotB===cur) showLoading(false); });

function slideNext(){
  if(busy || !queue.length) return;
  busy=true;
  const ni=(idx+1)%queue.length;
  if(nxt._qi!==ni) prepareSlot(nxt, ni);

  nxt.wrap.classList.remove("off-right","off-left","center"); nxt.wrap.classList.add("off-right");
  void nxt.wrap.offsetWidth;

  cur.wrap.classList.add("slide"); nxt.wrap.classList.add("slide");
  cur.wrap.classList.remove("center"); cur.wrap.classList.add("off-left");
  nxt.wrap.classList.remove("off-right"); nxt.wrap.classList.add("center");

  playCur(nxt);

  const done=()=>{
    nxt.wrap.removeEventListener("transitionend", done);
    stopSlot(cur);
    cur.wrap.classList.remove("slide","off-left","center"); cur.wrap.classList.add("off-right");
    nxt.wrap.classList.remove("slide");
    const tmp=cur; cur=nxt; nxt=tmp; idx=ni;
    preloadNext(); busy=false;
  };
  nxt.wrap.addEventListener("transitionend", done, {once:true});
  setTimeout(()=>{ if(busy) done(); }, 1000);
}

/* =========================================================================
   CONTROLES / UI
   ========================================================================= */
function showLoading(on){ $("#loading").classList.toggle("hidden", !on); }
function showError(on, title, msg){
  const el=$("#error"); el.classList.toggle("hidden", !on);
  if(on){ showLoading(false); if(title) $("#errTitle").textContent=title; if(msg) $("#errMsg").innerHTML=msg; }
}

function backToMenu(){
  stopSlot(slotA); stopSlot(slotB);
  try{ slotA.vid.removeAttribute("src"); slotB.vid.removeAttribute("src"); }catch(e){}
  queue=[]; busy=false; stopPromo();
  $("#player").classList.add("hidden"); $("#menu").classList.remove("hidden");
  showError(false); showLoading(false); showSoundCta(false);
  focusMenu();
}
$("#backBtn").addEventListener("click", backToMenu);
$("#errBack").addEventListener("click", backToMenu);

/* botão "Ativar som" — aparece só quando o navegador muta o YouTube */
function showSoundCta(on){
  const cta=$("#soundCta");
  cta.classList.toggle("hidden", !on);
  if(on){ setTimeout(()=>{ try{ cta.focus(); }catch(e){} }, 60); }
}
$("#soundCta").addEventListener("click", ()=>{ setSound(true); showSoundCta(false); });

/* ---------- pop-up "nova família" ---------- */
let promoTimer=null;

/* === celebrações aprovadas (vindas do Supabase) === */
let sbClient=null, _sbLib=null;
const celebs=[]; let celebIdx=0;
const shownIds=new Set();   // famílias que já apareceram no telão — nunca repete

function ensureSupabaseLib(){
  if(_sbLib) return Promise.resolve(_sbLib);
  return import("https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm")
    .then(m=>{ _sbLib=m; return m; });
}
async function tokenTV(){
  try{ const { data }=await sbClient.auth.getSession(); return data && data.session && data.session.access_token; }
  catch(e){ return null; }
}
async function signedUrl(path){
  if(!path) return null;
  try{
    const token = await tokenTV();
    const res = await fetch(`${SB.url}/storage/v1/object/sign/${SB.bucket}/${encodeURI(path)}`,{
      method:"POST",
      headers:{ "Authorization":"Bearer "+(token||SB.anonKey), "apikey":SB.anonKey, "content-type":"application/json" },
      body: JSON.stringify({ expiresIn: 21600 }) });
    if(!res.ok) return null;
    const j = await res.json();
    return j.signedURL ? (SB.url + "/storage/v1" + j.signedURL) : null;
  }catch(e){ return null; }
}
async function toCeleb(row){
  try{
    if(!row || !row.foto_telao) return null;
    const url = await signedUrl(row.foto_telao);
    if(!url) return null;
    return { id:row.id, url, nome:row.identificacao||"", loja:row.loja||"" };
  }catch(e){ return null; }
}
async function refreshCelebs(){
  if(!sbClient) return;
  try{
    const { data } = await sbClient.from("celebracoes").select("*")
      .eq("status","aprovado").order("decidido_em",{ascending:false}).limit(20);
    const list=[];
    for(const row of (data||[])){ const c=await toCeleb(row); if(c) list.push(c); }
    celebs.length=0; celebs.push(...list); celebIdx=0;
    // famílias já aprovadas ANTES da TV ligar não devem dar pop-up (só servem de histórico)
    for(const c of list) shownIds.add(c.id);
  }catch(e){}
}
async function initCelebracoes(){
  if(!SB.url || !SB.anonKey) return;           // não configurado → painel roda como hoje
  try{
    const { createClient } = await ensureSupabaseLib();
    sbClient = createClient(SB.url, SB.anonKey);
    if(SB.email && SB.senha){
      await sbClient.auth.signInWithPassword({ email:SB.email, password:SB.senha });
    }
    await refreshCelebs();
    sbClient.channel("telao-celebracoes")
      .on("postgres_changes",
          { event:"UPDATE", schema:"public", table:"celebracoes" },
          async (payload)=>{
            const row = payload.new;
            if(!row || row.status!=="aprovado") return;   // só aprovação
            if(shownIds.has(row.id)) return;              // nunca repete a mesma família
            const c = await toCeleb(row);
            if(!c) return;
            shownIds.add(c.id);
            if(!celebs.find(x=>x.id===c.id)) celebs.unshift(c);
            forcePromo(c);                                // aparece UMA vez, na hora da aprovação
          })
      .subscribe();
  }catch(e){ /* silencioso: a TV continua tocando os vídeos normalmente */ }
}
function nextCeleb(){
  if(!celebs.length) return null;
  const c=celebs[celebIdx % celebs.length]; celebIdx++; return c;
}
function paintPromo(celeb){
  const promo=$("#promo"), face=$("#promoFace");
  const nome = celeb && celeb.nome, loja = celeb && celeb.loja;
  if(celeb && celeb.url){
    face.src=celeb.url; promo.classList.remove("no-face");        // foto + selo "+"
  } else {
    promo.classList.add("no-face"); face.removeAttribute("src");  // só o "+" da Metrocasa
  }
  $("#promoText").textContent = nome ? ("Bem-vindos, "+nome+"! 💚❤️")
                                     : (celeb ? "Bem-vindos à família! 💚❤️"
                                              : PROMOS[Math.floor(Math.random()*PROMOS.length)]);
  const lj=$("#promoLoja");
  if(loja){ lj.textContent = "Loja "+loja; lj.style.display=""; }
  else    { lj.textContent = ""; lj.style.display="none"; }
}
function canShowPromo(){
  return !$("#player").classList.contains("hidden") && $("#error").classList.contains("hidden");
}
function showPromoOnce(){
  if(!canShowPromo()) return;
  paintPromo(nextCeleb());          // família real se houver; senão o card decorativo
  const el=$("#promo"); el.classList.add("show");
  setTimeout(()=> el.classList.remove("show"), CFG.promoShowMs);
}
function forcePromo(celeb){
  if(!canShowPromo()) return;
  paintPromo(celeb);
  const el=$("#promo"); el.classList.remove("show"); void el.offsetWidth; el.classList.add("show");
  setTimeout(()=> el.classList.remove("show"), CFG.promoShowMs);
}
function schedulePromo(){
  clearTimeout(promoTimer);
  const delay = CFG.promoMinMs + Math.random()*(CFG.promoMaxMs-CFG.promoMinMs);
  promoTimer = setTimeout(()=>{ showPromoOnce(); schedulePromo(); }, delay);
}
function stopPromo(){ clearTimeout(promoTimer); $("#promo").classList.remove("show"); }

function updateSoundIcon(){
  const on=wantSound;
  $("#soundBtn").title = on ? "Som ligado" : "Mudo";
  $("#soundIcon").innerHTML = on
    ? '<path d="M4 9 H8 L13 5 V19 L8 15 H4 Z"/><path d="M16 9 a4 4 0 0 1 0 6"/><path d="M18.5 6.5 a8 8 0 0 1 0 11"/>'
    : '<path d="M4 9 H8 L13 5 V19 L8 15 H4 Z"/><path d="M17 9 L21 15 M21 9 L17 15"/>';
}
/* ---------- som / play-pause (reutilizável: botão + teclado) ---------- */
function setSound(on){
  wantSound = on;
  if(cur){
    if(cur.kind==="yt"){ try{ on?cur.yt.unMute():cur.yt.mute(); if(on) cur.yt.playVideo(); }catch(e){} }
    else { cur.vid.muted=!on; if(on) cur.vid.play().catch(()=>{}); }
  }
  if(on) showSoundCta(false);
  updateSoundIcon();
}
function togglePlay(){
  if(!cur) return;
  if(cur.kind==="yt"){
    try{ const st=cur.yt.getPlayerState(); (st===1)?cur.yt.pauseVideo():cur.yt.playVideo(); }catch(e){}
  } else {
    cur.vid.paused ? cur.vid.play().catch(()=>{}) : cur.vid.pause();
  }
}
$("#soundBtn").addEventListener("click", ()=> setSound(!wantSound));

/* ---------- foco do menu (teclado / controle de TV) ---------- */
const choices = Array.from(document.querySelectorAll(".choice"));
let lastChoice = 0;
function focusChoice(i){
  if(!choices.length) return;
  lastChoice = (i + choices.length) % choices.length;
  choices[lastChoice].focus();
}
function focusMenu(){ focusChoice(lastChoice); }
choices.forEach((b,i)=> b.addEventListener("focus", ()=> lastChoice=i));

/* ---------- tela cheia (kiosk) ---------- */
function isFs(){ return !!(document.fullscreenElement || document.webkitFullscreenElement); }
function goFullscreen(){
  if(isFs()) return;
  const el=document.documentElement;
  const req = el.requestFullscreen || el.webkitRequestFullscreen || el.msRequestFullscreen;
  if(req){ try{ req.call(el); }catch(e){} }
}
function toggleFullscreen(){
  if(isFs()){
    const ex = document.exitFullscreen || document.webkitExitFullscreen || document.msExitFullscreen;
    if(ex){ try{ ex.call(document); }catch(e){} }
  } else goFullscreen();
}
/* navegador não deixa entrar em tela cheia sozinho: entra no 1º gesto (toque/tecla/OK) */
function armFullscreen(){ if(!isFs()) goFullscreen(); }
["pointerdown","touchstart","keydown"].forEach(ev=>document.addEventListener(ev, armFullscreen));

/* ---------- teclado / controle remoto ---------- */
document.addEventListener("keydown", (e)=>{
  if(e.key==="f" || e.key==="F"){ toggleFullscreen(); return; }   // tecla F = tela cheia
  if(e.key==="p" || e.key==="P"){ showPromoOnce(); return; }       // tecla P = testar o pop-up
  const inPlayer = !$("#player").classList.contains("hidden");

  if(!inPlayer){
    // MENU: setas movem o foco; Enter/OK aciona o botão focado (nativo)
    const i = choices.indexOf(document.activeElement);
    if(e.key==="ArrowLeft" || e.key==="ArrowUp"){ focusChoice((i<0?0:i)-1); e.preventDefault(); }
    else if(e.key==="ArrowRight" || e.key==="ArrowDown"){ focusChoice((i<0?0:i)+1); e.preventDefault(); }
    else if((e.key==="Enter"||e.key===" ") && i<0){ focusChoice(0); e.preventDefault(); }
    return;
  }

  // PLAYER
  if(e.key==="Escape" || e.key==="Backspace"){ backToMenu(); }
  else if(e.key==="ArrowRight"){ slideNext(); }
  else if(e.key==="ArrowLeft"){ if(!busy && queue.length>1){ idx=(idx-2+queue.length)%queue.length; slideNext(); } }
  else if(e.key==="ArrowUp"){ setSound(true); }
  else if(e.key==="ArrowDown"){ setSound(false); }
  else if(e.key==="Enter" || e.key===" "){
    if(document.activeElement && document.activeElement.tagName==="BUTTON") return; // deixa o botão focado agir
    e.preventDefault(); togglePlay();
  }
});

/* esconde os controles quando parado (TV) */
let idleTimer;
function activity(){
  $("#ui").classList.remove("idle");
  clearTimeout(idleTimer);
  idleTimer=setTimeout(()=>$("#ui").classList.add("idle"), 3500);
}
["mousemove","keydown","click","touchstart"].forEach(ev=>document.addEventListener(ev, activity));
activity();
updateSoundIcon();
focusMenu();   // já deixa um card selecionado p/ controle/teclado

/* bootstrap: carrega API do YouTube e pré-carrega os links */
loadYTApi();
fetchLinks().then(l=>{ LINKS=l; }).catch(()=>{});
setInterval(()=>{ fetchLinks().then(l=>{ LINKS=l; }).catch(()=>{}); }, CFG.pollMs);

/* conecta ao Supabase (se configurado) e renova as fotos aprovadas periodicamente */
initCelebracoes();
setInterval(refreshCelebs, 30 * 60 * 1000);

</script>
